name: Push-Actions

on: [push]

jobs:
  pre_commit_validation:
    name: Validate that pre-commit hooks have run
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Run hooks again to validate they have run
        uses: xu-cheng/texlive-action@v2
        with:
          run: |
            apk update
            apk upgrade
            apk add --virtual build-dependencies build-base gcc wget git
            apk add --no-cache python3 python3-dev py3-pip nodejs npm
            python3 -m venv venv
            source venv/bin/activate
            pip3 install pre-commit
            git config --global --add safe.directory /github/workspace
            pre-commit run --verbose --all-files > pre-commit-validation.txt & cat pre-commit-validation.txt
            if cat pre-commit-validation.txt | grep -q Failed;
            then
              echo "Pre-commit run did not run on local machine."
              exit 1
            else
              echo "Pre-commit did run on local machine."
            fi

  setup_matrix:
    name: Determine files for parallel build
    runs-on: ubuntu-latest
    needs: [pre_commit_validation]
    if: contains(needs.*.result, 'success')
    outputs:
      lectures: ${{ steps.set-matrix-lectures.outputs.lectures }}
      exercises: ${{ steps.set-matrix-exercises.outputs.exercises }}
      submissions: ${{ steps.set-matrix-submissions.outputs.submissions }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Find all lecture tex files
        id: set-matrix-lectures
        run: |
          cd lecture
          LECTURES_JSON=$(ls *.tex | sed 's/\.tex$//' | jq -R -s -c 'split("\n")[:-1]')
          echo "lectures=$LECTURES_JSON" >> $GITHUB_OUTPUT

      - name: Find all exercise tex files
        id: set-matrix-exercises
        run: |
          cd exercise
          EXERCISES_JSON=$(ls *.tex | sed 's/\.tex$//' | jq -R -s -c 'split("\n")[:-1]')
          echo "exercises=$EXERCISES_JSON" >> $GITHUB_OUTPUT

      - name: Find all submission tex files
        id: set-matrix-submissions
        run: |
          cd submission
          SUBMISSIONS_JSON=$(ls *.tex | sed 's/\.tex$//' | jq -R -s -c 'split("\n")[:-1]')
          echo "submissions=$SUBMISSIONS_JSON" >> $GITHUB_OUTPUT

  build_lecture_figures:
    name: Build lecture figures
    runs-on: ubuntu-latest
    needs: [setup_matrix]
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Build figures
        uses: ./lecture/
        env:
          WORKSPACE: ${{ github.workspace }}
        with:
          run: |
            cd $WORKSPACE/lecture
            make figures

      - name: Upload Figures
        uses: actions/upload-artifact@v7
        with:
          name: Lecture-Figures
          path: lecture/img/*.pdf
          retention-days: 1
          if-no-files-found: ignore

  build_lecture:
    name: Build lecture PDF (${{ matrix.lecture }})
    runs-on: ubuntu-latest
    needs: [build_lecture_figures, setup_matrix]
    strategy:
      fail-fast: false
      matrix:
        lecture: ${{ fromJson(needs.setup_matrix.outputs.lectures) }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Download Figures
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: Lecture-Figures
          path: lecture/img/

      - name: Random delay to stagger Docker pull
        run: sleep $((RANDOM % 45))

      - name: Compile LaTeX document
        uses: xu-cheng/texlive-action@v2
        with:
          run: |
            apk add make git
            git config --global --add safe.directory /github/workspace
            git config --global --add safe.directory /home/runner/work/KDD/KDD
            cd lecture
            make vc.tex
            make ${{ matrix.lecture }}.pdf

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Lecture Slides - ${{ matrix.lecture }}
          path: |
            lecture/output/${{ matrix.lecture }}.pdf
            lecture/output/${{ matrix.lecture }}.log
          retention-days: 90

  build_exercise:
    name: Build exercise archives (${{ matrix.exercise }})
    runs-on: ubuntu-latest
    needs: [pre_commit_validation, setup_matrix]
    if: contains(needs.*.result, 'success')
    strategy:
      fail-fast: false
      matrix:
        exercise: ${{ fromJson(needs.setup_matrix.outputs.exercises) }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Random delay to stagger Docker pull
        run: sleep $((RANDOM % 45))

      - name: Create the exercise archives
        uses: xu-cheng/texlive-action@v2
        with:
          run: |
            apk update
            apk upgrade
            apk add --virtual build-dependencies build-base gcc wget git
            apk add --no-cache python3 python3-dev py3-pip nodejs npm
            python3 -m venv venv
            source venv/bin/activate
            pip3 install -r exercise/requirements.txt
            cd exercise
            make ${{ matrix.exercise }}-Student
            make ${{ matrix.exercise }}-Solution

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Exercise Archives - ${{ matrix.exercise }}
          path: exercise/output/*.zip
          if-no-files-found: ignore
          retention-days: 90

  build_submission:
    name: Build submission PDF (${{ matrix.submission }})
    runs-on: ubuntu-latest
    needs: [pre_commit_validation, setup_matrix]
    if: contains(needs.*.result, 'success')
    strategy:
      fail-fast: false
      matrix:
        submission: ${{ fromJson(needs.setup_matrix.outputs.submissions) }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Random delay to stagger Docker pull
        run: sleep $((RANDOM % 45))

      - name: Create the submission PDFs
        uses: xu-cheng/texlive-action@v2
        with:
          run: |
            apk update
            apk upgrade
            apk add --virtual build-dependencies build-base gcc wget git
            cd submission
            make ${{ matrix.submission }}.tex

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Submission PDFs - ${{ matrix.submission }}
          path: submission/output/*.pdf
          if-no-files-found: ignore
          retention-days: 90

  publish_artifacts:
    name: Publish artifacts to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build_lecture, build_exercise, build_submission]
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Create badges directory
        run: mkdir -p artifacts/gh-badges

      - name: Download Lecture Slides
        uses: actions/download-artifact@v4
        with:
          pattern: Lecture Slides - *
          path: artifacts/lecture-slides
          merge-multiple: true

      - name: Download Exercise Archives
        uses: actions/download-artifact@v4
        with:
          pattern: Exercise Archives - *
          path: artifacts/exercise-archives
          merge-multiple: true

      - name: Download Submission PDFs
        uses: actions/download-artifact@v4
        with:
          pattern: Submission PDFs - *
          path: artifacts/submission-pdfs
          merge-multiple: true

      - name: Create ZIP files
        run: |
          cd artifacts
          zip -r lecture-slides.zip lecture-slides/
          zip -r exercise-archives.zip exercise-archives/
          zip -r submission-pdfs.zip submission-pdfs/

      - name: Unpack all exercise archives
        run: |
          cd artifacts/exercise-archives
          for file in *.zip; do
            unzip -o "$file" -d "${file%.zip}"
          done

      - name: Generate Badge Images
        run: |
          SHA=$(git rev-parse --short HEAD)
          CURRENT_TIME=$(TZ="Europe/Berlin" date "+%d.%m.%Y %H:%M")
          npm install -g badge-maker
          npx badge-maker "Lectures" "Download" "#41748D" @flat-square > artifacts/gh-badges/lectures-badge.svg
          npx badge-maker "Exercises" "Download" "#228848" @flat-square > artifacts/gh-badges/exercises-badge.svg
          npx badge-maker "Submissions" "Download" "#971B2F" @flat-square > artifacts/gh-badges/submissions-badge.svg
          npx badge-maker "Current SHA" "${SHA}" "#041E42" @flat-square > artifacts/gh-badges/sha-badge.svg
          npx badge-maker "Update Time" "${CURRENT_TIME} (MEZ/MESZ)" "#041E42" @flat-square > artifacts/gh-badges/time-badge.svg

      - name: Create index.html
        run: |
          SHA=$(git rev-parse --short HEAD)
          CURRENT_TIME=$(TZ="Europe/Berlin" date "+%d.%m.%Y %H:%M")
          LONG_SHA=$(git rev-parse HEAD)

          sed -e "s/\[DATE_OF_UPDATE\]/${CURRENT_TIME}/g" \
              -e "s/\[SHA_OF_UPDATE\]/${SHA}/g" \
              -e "s/\[LONG_SHA_OF_UPDATE\]/${LONG_SHA}/g" \
              .github/workflows/pages/index.template.html > artifacts/index.html

      - name: Create sitemap.xml
        run: |
          CURRENT_TIME=$(TZ="Europe/Berlin" date -u +"%Y-%m-%dT%H:%M:%S+00:00")
          LONG_SHA=$(git rev-parse HEAD)

          sed -e "s/\[DATE_OF_UPDATE\]/${CURRENT_TIME}/g" \
              .github/workflows/pages/sitemap.template.xml > artifacts/sitemap.xml

      - name: Copy the logo(s) and the google search console identification to artifacts
        run: |
          cp .github/workflows/pages/fau-logo.svg artifacts/fau-logo.svg
          cp .github/workflows/pages/favicon.png artifacts/favicon.png

      - name: Linearize PDFs for Fast Web View (SEO & Performance)
        run: |
          sudo apt-get update && sudo apt-get install -y qpdf
          find artifacts -name "*.pdf" -exec qpdf --linearize --replace-input {} \;

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts
          force_orphan: true
